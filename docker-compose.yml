services:

  # ─── Frigate NVR ──────────────────────────────────────────────────────────
  # Object detection runs on the NVIDIA GB10 GPU (ONNX Runtime + CUDA).
  # The NVIDIA Container Toolkit runtime is required — run scripts/setup.sh first.
  frigate:
    container_name: frigate
    image: ghcr.io/blakeblackshear/frigate:stable
    restart: unless-stopped
    stop_grace_period: 30s
    privileged: true
    shm_size: "256mb"
    runtime: nvidia
    environment:
      TZ: ${TZ:-Europe/London}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config/frigate.yml:/config/config.yml:ro
      - ./config/demo:/config/demo:ro
      - ${RECORDINGS_PATH:-./data/recordings}:/media/frigate
      - ./data/db:/data/db
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1073741824
    ports:
      - "8971:8971"
      - "5000:5000"
      - "8554:8554"
      - "8555:8555/tcp"
      - "8555:8555/udp"
    depends_on:
      - mqtt
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── Mosquitto MQTT broker ────────────────────────────────────────────────
  # Frigate publishes detection events to MQTT.
  mqtt:
    container_name: mqtt
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    ports:
      - "1883:1883"

volumes:
  mosquitto-data:
  mosquitto-log:
