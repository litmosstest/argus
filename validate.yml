name: Validate

on:
  push:
    paths:
      - 'config/**'
      - 'docker-compose.yml'
      - 'scripts/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'config/**'
      - 'docker-compose.yml'
      - 'scripts/**'

jobs:

  validate-compose:
    name: docker-compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          cp .env.example .env
          docker compose config --quiet
          echo "✓ docker-compose.yml valid"

  validate-yaml:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install yamllint
      - run: |
          yamllint -d relaxed config/frigate.yml
          echo "✓ frigate.yml valid"

  check-secrets:
    name: No secrets committed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "ERROR: .env is tracked by git"
            exit 1
          fi
          if grep -rE 'sk-ant-[a-zA-Z0-9-]+' .; then
            echo "ERROR: Anthropic API key found in repo"
            exit 1
          fi
          echo "✓ No secrets detected"
