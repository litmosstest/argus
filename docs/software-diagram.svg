<svg xmlns="http://www.w3.org/2000/svg" width="680" height="540" viewBox="0 0 680 540" style="background:#fff;font-family:sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Vision pipeline container -->
  <rect x="30" y="30" width="300" height="200" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="44" y="54" font-size="14" font-weight="500" fill="#2C2C2A">Vision pipeline</text>
  <text x="44" y="70" font-size="12" fill="#5F5E5A">Pi 5 CPU</text>

  <!-- Camera feeds -->
  <rect x="50" y="86" width="120" height="44" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="110" y="104" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Camera feeds</text>
  <text x="110" y="120" text-anchor="middle" font-size="12" fill="#5F5E5A">USB / RTSP</text>

  <!-- go2rtc -->
  <rect x="190" y="86" width="120" height="44" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="250" y="112" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">go2rtc</text>
  <line x1="170" y1="108" x2="189" y2="108" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Frigate -->
  <rect x="50" y="160" width="260" height="50" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="180" y="180" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Frigate NVR (Docker)</text>
  <text x="180" y="198" text-anchor="middle" font-size="12" fill="#5F5E5A">CPU detection · recording · snapshots</text>
  <line x1="250" y1="130" x2="250" y2="159" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="110" y1="130" x2="110" y2="159" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Event store -->
  <rect x="30" y="260" width="140" height="56" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="100" y="282" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Event store</text>
  <text x="100" y="298" text-anchor="middle" font-size="12" fill="#5F5E5A">SQLite · USB SSD</text>
  <line x1="100" y1="210" x2="100" y2="259" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- MQTT -->
  <rect x="190" y="260" width="140" height="56" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="260" y="282" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">MQTT broker</text>
  <text x="260" y="298" text-anchor="middle" font-size="12" fill="#5F5E5A">Mosquitto · Docker</text>
  <line x1="225" y1="210" x2="260" y2="259" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Voice pipeline container -->
  <rect x="350" y="30" width="300" height="420" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="364" y="54" font-size="14" font-weight="500" fill="#085041">Voice pipeline</text>
  <text x="364" y="70" font-size="12" fill="#0F6E56">Hailo-10H NPU + Pi 5 CPU</text>

  <!-- Mic -->
  <rect x="370" y="86" width="120" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="430" y="112" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">USB microphone</text>

  <!-- Whisper encoder -->
  <rect x="370" y="158" width="260" height="56" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="500" y="180" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Whisper encoder</text>
  <text x="500" y="198" text-anchor="middle" font-size="12" fill="#0F6E56">Hailo-10H NPU · ~8× faster</text>
  <line x1="430" y1="130" x2="430" y2="157" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Whisper decoder -->
  <rect x="370" y="240" width="260" height="56" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="500" y="262" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Whisper decoder</text>
  <text x="500" y="280" text-anchor="middle" font-size="12" fill="#5F5E5A">Pi 5 CPU · KV cache · ONNX</text>
  <line x1="500" y1="214" x2="500" y2="239" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- LLM -->
  <rect x="370" y="324" width="260" height="56" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="500" y="346" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Qwen2.5-1.5B LLM</text>
  <text x="500" y="364" text-anchor="middle" font-size="12" fill="#0F6E56">Hailo-10H NPU · hailo-ollama</text>
  <line x1="500" y1="296" x2="500" y2="323" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Piper TTS -->
  <rect x="370" y="406" width="260" height="30" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="500" y="425" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">Piper TTS · speaker</text>
  <line x1="500" y1="380" x2="500" y2="405" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Cross-pipeline event context arrow -->
  <path d="M170 288 L330 288 L330 352 L369 352" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="250" y="280" text-anchor="middle" font-size="12" fill="#5F5E5A">events</text>

  <!-- Legend -->
  <rect x="30" y="494" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="50" y="505" font-size="12" fill="#5F5E5A">Hailo-10H NPU</text>
  <rect x="160" y="494" width="14" height="14" rx="3" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="180" y="505" font-size="12" fill="#5F5E5A">Pi 5 CPU</text>
  <rect x="260" y="494" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="280" y="505" font-size="12" fill="#5F5E5A">Audio I/O</text>
  <line x1="370" y1="500" x2="400" y2="500" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="408" y="505" font-size="12" fill="#5F5E5A">event context</text>
</svg>
