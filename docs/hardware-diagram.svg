<svg xmlns="http://www.w3.org/2000/svg" width="680" height="460" viewBox="0 0 680 460" style="background:#fff;font-family:sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Pi 5 outer container -->
  <rect x="180" y="140" width="320" height="180" rx="14" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="168" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Raspberry Pi 5 (16GB)</text>
  <text x="340" y="186" text-anchor="middle" font-size="12" fill="#5F5E5A">Arm Cortex-A76 · Frigate CPU detection</text>

  <!-- Hailo-10H HAT -->
  <rect x="204" y="200" width="272" height="96" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="228" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Hailo-10H AI HAT+ 2</text>
  <text x="340" y="248" text-anchor="middle" font-size="12" fill="#0F6E56">40 TOPS · 8GB on-board RAM</text>
  <text x="340" y="268" text-anchor="middle" font-size="12" fill="#0F6E56">Whisper STT encoder · Qwen2.5 LLM</text>

  <text x="340" y="196" text-anchor="middle" font-size="12" fill="#5F5E5A">PCIe ×1</text>

  <!-- USB SSD -->
  <rect x="460" y="220" width="140" height="56" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="530" y="244" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">USB SSD</text>
  <text x="530" y="262" text-anchor="middle" font-size="12" fill="#5F5E5A">Recordings · DB</text>
  <line x1="500" y1="248" x2="461" y2="248" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="488" y="238" text-anchor="middle" font-size="12" fill="#5F5E5A">USB 3</text>

  <!-- Webcam 1 -->
  <rect x="40" y="80" width="120" height="56" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="100" y="104" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Webcam 1</text>
  <text x="100" y="122" text-anchor="middle" font-size="12" fill="#5F5E5A">Logitech C920</text>
  <line x1="160" y1="108" x2="207" y2="190" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="175" y="148" font-size="12" fill="#5F5E5A">USB</text>

  <!-- Webcam 2 -->
  <rect x="40" y="160" width="120" height="56" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="100" y="184" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Webcam 2</text>
  <text x="100" y="202" text-anchor="middle" font-size="12" fill="#5F5E5A">Logitech C920</text>
  <line x1="160" y1="188" x2="179" y2="220" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- USB Mic -->
  <rect x="40" y="260" width="120" height="56" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="100" y="284" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">USB mic</text>
  <text x="100" y="302" text-anchor="middle" font-size="12" fill="#534AB7">Voice input</text>
  <line x1="160" y1="288" x2="179" y2="288" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Speaker -->
  <rect x="40" y="340" width="120" height="56" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="100" y="364" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">Speaker</text>
  <text x="100" y="382" text-anchor="middle" font-size="12" fill="#534AB7">Piper TTS output</text>
  <path d="M179 310 L160 364" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Network -->
  <rect x="460" y="140" width="140" height="56" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="530" y="164" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Network</text>
  <text x="530" y="182" text-anchor="middle" font-size="12" fill="#5F5E5A">Ethernet / Wi-Fi</text>
  <line x1="500" y1="168" x2="461" y2="168" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="488" y="158" text-anchor="middle" font-size="12" fill="#5F5E5A">LAN</text>

  <!-- Power supply -->
  <rect x="280" y="380" width="120" height="44" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="400" text-anchor="middle" font-size="14" font-weight="500" fill="#412402">USB-C PSU</text>
  <text x="340" y="416" text-anchor="middle" font-size="12" fill="#854F0B">27W · official</text>
  <line x1="340" y1="379" x2="340" y2="321" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="40" y="428" width="14" height="14" rx="3" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="60" y="439" font-size="12" fill="#5F5E5A">Hardware / storage</text>
  <rect x="180" y="428" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="200" y="439" font-size="12" fill="#5F5E5A">AI accelerator</text>
  <rect x="300" y="428" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="320" y="439" font-size="12" fill="#5F5E5A">Audio I/O</text>
  <rect x="400" y="428" width="14" height="14" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="420" y="439" font-size="12" fill="#5F5E5A">Power</text>
</svg>
