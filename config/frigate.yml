# Argus — Frigate NVR configuration for NVIDIA DGX Spark
# GPU: NVIDIA GB10 (Blackwell, Compute Capability 12.1, CUDA 13+)

mqtt:
  enabled: true
  host: mqtt
  port: 1883
  topic_prefix: frigate
  client_id: frigate

database:
  path: /data/db/frigate.db

# ─── Object detector ────────────────────────────────────────────────────────
# ONNX Runtime — device: AUTO lets Frigate pick the best available provider.
# The standard Frigate ARM64 image ships CPUExecutionProvider only.
# For GPU inference, rebuild with onnxruntime-gpu ARM64 (see README).
detectors:
  onnx_detector:
    type: onnx
    device: AUTO

# YOLOv8n exported to ONNX (320x320). Generated by setup.sh via ultralytics.
# model.path must point to the file inside the container.
model:
  model_type: yolo-generic
  path: /config/model_cache/yolov8n_320.onnx
  width: 320
  height: 320
  input_tensor: nchw
  input_pixel_format: bgr
  labelmap_path: /labelmap/coco-80.txt

# ─── Demo video stream ───────────────────────────────────────────────────────
# The Kitware MP4 is looped at native frame rate via FFmpeg inside go2rtc.
# Download it first with:  scripts/setup.sh  (or see README)
go2rtc:
  streams:
    demo_camera:
      - ffmpeg:/config/demo/kitware_demo.mp4#video=copy#loop

objects:
  track:
    - person
    - car
    - bicycle
    - motorcycle
  filters:
    person:
      min_score: 0.5
      threshold: 0.7
    car:
      min_score: 0.5
      threshold: 0.7

cameras:
  demo_camera:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/demo_camera
          roles:
            - detect
        - path: rtsp://127.0.0.1:8554/demo_camera
          roles:
            - record
    detect:
      enabled: true
      width: 1280
      height: 720
      fps: 5
    record:
      enabled: true
    snapshots:
      enabled: true
      timestamp: true
      bounding_box: true
    motion:
      threshold: 25
      improve_contrast: true

record:
  enabled: true
  alerts:
    retain:
      days: 14
  detections:
    retain:
      days: 14

snapshots:
  enabled: true
  timestamp: true
  bounding_box: true
  retain:
    default: 14

birdseye:
  enabled: true
  mode: objects

timestamp_style:
  position: tl
  format: '%Y-%m-%d %H:%M:%S'
  color:
    red: 255
    green: 255
    blue: 255
version: 0.17-0
