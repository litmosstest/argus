# Argus — Frigate NVR configuration for NVIDIA DGX Spark
# GPU: NVIDIA GB10 (Blackwell, Compute Capability 12.1, CUDA 13+)

mqtt:
  enabled: true
  host: mqtt
  port: 1883
  topic_prefix: frigate
  client_id: frigate

database:
  path: /data/db/frigate.db

# ─── GPU-accelerated detector ───────────────────────────────────────────────
# ONNX Runtime with CUDA execution provider — works on ARM64 + full NVIDIA GPU.
# The official TensorRT Frigate image targets x86_64 only; ONNX+CUDA is the
# recommended path for the GB10 Superchip.
detectors:
  onnx_gpu:
    type: onnx
    device: cuda:0

# model_type tells Frigate which ONNX model to load/download.
# yolox at 320x320 is lightweight; increase to 640x640 for higher accuracy.
model:
  model_type: yolox
  width: 320
  height: 320
  input_tensor: nhwc
  input_pixel_format: rgb
  input_dtype: int
  labelmap_path: /labelmap/coco-80.txt

# ─── Demo video stream ───────────────────────────────────────────────────────
# The Kitware MP4 is looped at native frame rate via FFmpeg inside go2rtc.
# Download it first with:  scripts/setup.sh  (or see README)
go2rtc:
  streams:
    demo_camera:
      - "ffmpeg:-stream_loop -1 -re -i /config/demo/kitware_demo.mp4#video=h264"

objects:
  track:
    - person
    - car
    - bicycle
    - motorcycle
  filters:
    person:
      min_score: 0.5
      threshold: 0.7
    car:
      min_score: 0.5
      threshold: 0.7

cameras:
  demo_camera:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/demo_camera
          roles:
            - detect
        - path: rtsp://127.0.0.1:8554/demo_camera
          roles:
            - record
    detect:
      enabled: true
      width: 1280
      height: 720
      fps: 5
    record:
      enabled: true
    snapshots:
      enabled: true
      timestamp: true
      bounding_box: true
    motion:
      threshold: 25
      improve_contrast: true

record:
  enabled: true
  alerts:
    retain:
      days: 14
  detections:
    retain:
      days: 14

snapshots:
  enabled: true
  timestamp: true
  bounding_box: true
  retain:
    default: 14

birdseye:
  enabled: true
  mode: objects

timestamp_style:
  position: tl
  format: '%Y-%m-%d %H:%M:%S'
  color:
    red: 255
    green: 255
    blue: 255
